name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # The @n8n toolchain is CommonJS but pulls ESM-only deps; enable require(ESM).
      NODE_OPTIONS: --experimental-require-module
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Lint (strict mode — n8n verification rules)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

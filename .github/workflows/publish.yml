name: Publish to npm

# Fires when a tag like `v0.1.0` is pushed.
# Publishes with npm provenance (required for n8n verification).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # Needed for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # The @n8n toolchain is CommonJS but pulls ESM-only deps (change-case,
      # eslint plugin); this enables require(ESM) on any Node 22.x.
      NODE_OPTIONS: --experimental-require-module
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Lint (strict mode — n8n verification rules)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_MODE: '1' # Allow @n8n/node-cli prerelease hook to pass
